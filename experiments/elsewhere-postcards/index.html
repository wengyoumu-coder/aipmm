<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="A deterministic postcard from a place that does not exist."
    >
    <title>Elsewhere Postcards</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #172326;
        --paper: #efe7d2;
        --sky-a: #b9d4d1;
        --sky-b: #edc9a8;
        --land-a: #4b655f;
        --land-b: #263f43;
        --sun: #f6d47a;
        --sun-x: 74%;
        --sun-y: 24%;
        --ridge-one: 43%;
        --ridge-two: 58%;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 16% 14%, #ffffff9c, transparent 24rem),
          linear-gradient(135deg, #d9d3c5, #b7c6c3);
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: clamp(28px, 6vw, 72px) 0;
      }

      .eyebrow,
      label,
      button,
      input,
      .serial {
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      }

      .eyebrow {
        margin: 0 0 12px;
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 760px;
        margin: 0;
        font-size: clamp(2.5rem, 7vw, 6.2rem);
        font-weight: 400;
        letter-spacing: -0.055em;
        line-height: 0.88;
      }

      .introduction {
        max-width: 560px;
        margin: 22px 0 34px;
        font-size: clamp(1rem, 2vw, 1.25rem);
        line-height: 1.55;
      }

      .postcard {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.65fr);
        min-height: 570px;
        overflow: hidden;
        border: 1px solid #17232633;
        border-radius: 3px;
        background: var(--paper);
        box-shadow: 0 28px 80px #17232633;
        transform: rotate(-0.35deg);
      }

      .landscape {
        position: relative;
        min-height: 520px;
        overflow: hidden;
        background: linear-gradient(180deg, var(--sky-a), var(--sky-b));
        isolation: isolate;
      }

      .grain {
        position: absolute;
        inset: 0;
        z-index: 5;
        opacity: 0.22;
        background-image:
          repeating-radial-gradient(
            circle at 20% 30%,
            transparent 0 2px,
            #1723261c 3px 4px
          );
        background-size: 9px 11px;
        mix-blend-mode: multiply;
        pointer-events: none;
      }

      .sun {
        position: absolute;
        left: var(--sun-x);
        top: var(--sun-y);
        width: clamp(72px, 12vw, 138px);
        aspect-ratio: 1;
        border-radius: 50%;
        background: var(--sun);
        box-shadow: 0 0 70px #fff5;
        transform: translate(-50%, -50%);
      }

      .ridge {
        position: absolute;
        right: -8%;
        bottom: -1px;
        left: -8%;
        transform-origin: bottom;
      }

      .ridge.back {
        height: var(--ridge-two);
        background: var(--land-a);
        clip-path: polygon(
          0 61%, 12% 48%, 24% 56%, 39% 28%, 52% 44%,
          65% 20%, 78% 49%, 90% 34%, 100% 52%, 100% 100%, 0 100%
        );
        opacity: 0.72;
      }

      .ridge.front {
        height: var(--ridge-one);
        background: var(--land-b);
        clip-path: polygon(
          0 45%, 15% 28%, 28% 49%, 45% 18%, 62% 55%,
          77% 33%, 89% 50%, 100% 29%, 100% 100%, 0 100%
        );
      }

      .postcard-copy {
        display: flex;
        flex-direction: column;
        padding: clamp(28px, 5vw, 58px);
        border-left: 1px solid #1723262b;
        background:
          linear-gradient(#ffffff36, #ffffff00),
          repeating-linear-gradient(
            0deg,
            transparent 0 23px,
            #17232610 24px
          );
      }

      .serial {
        margin: 0 0 auto;
        font-size: 0.68rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .place {
        margin: 80px 0 10px;
        font-size: clamp(2.2rem, 5vw, 4.8rem);
        font-weight: 400;
        letter-spacing: -0.045em;
        line-height: 0.92;
      }

      .coordinates {
        margin: 0 0 34px;
        font-style: italic;
      }

      .observation {
        margin: 0;
        font-size: clamp(1.1rem, 2vw, 1.45rem);
        line-height: 1.5;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: end;
        margin-top: 30px;
      }

      .seed-field {
        display: grid;
        gap: 7px;
        flex: 1 1 260px;
      }

      label {
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      input,
      button {
        min-height: 46px;
        border: 1px solid var(--ink);
        border-radius: 0;
        font-size: 0.9rem;
      }

      input {
        width: 100%;
        padding: 0 14px;
        color: var(--ink);
        background: #fff8;
      }

      button {
        padding: 0 17px;
        color: var(--paper);
        background: var(--ink);
        cursor: pointer;
      }

      button.secondary {
        color: var(--ink);
        background: transparent;
      }

      .privacy {
        margin: 16px 0 0;
        font-size: 0.85rem;
        line-height: 1.45;
      }

      @media (max-width: 760px) {
        .postcard {
          grid-template-columns: 1fr;
          transform: none;
        }

        .landscape {
          min-height: 390px;
        }

        .postcard-copy {
          min-height: 420px;
          border-top: 1px solid #1723262b;
          border-left: 0;
        }

        .place {
          margin-top: 68px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          scroll-behavior: auto !important;
        }
      }
    </style>
    <script src="postcard.js" defer></script>
  </head>
  <body>
    <main>
      <p class="eyebrow">Experiment 002 · Local artifact</p>
      <h1>Postcards from elsewhere.</h1>
      <p class="introduction">
        Enter a seed. The same seed always returns to the same invented place;
        nothing is sent anywhere.
      </p>

      <article class="postcard" aria-live="polite">
        <div class="landscape" aria-hidden="true">
          <div class="sun"></div>
          <div class="ridge back"></div>
          <div class="ridge front"></div>
          <div class="grain"></div>
        </div>
        <div class="postcard-copy">
          <p class="serial" id="serial"></p>
          <h2 class="place" id="place"></h2>
          <p class="coordinates" id="coordinates"></p>
          <p class="observation" id="observation"></p>
        </div>
      </article>

      <form class="controls" id="seed-form">
        <div class="seed-field">
          <label for="seed">Return address</label>
          <input
            id="seed"
            name="seed"
            maxlength="48"
            autocomplete="off"
            spellcheck="false"
          >
        </div>
        <button type="submit">Visit this place</button>
        <button class="secondary" id="another" type="button">
          Another elsewhere
        </button>
      </form>
      <p class="privacy">
        The hash in this page's address is the whole memory. No network,
        storage, cookies, or analytics.
      </p>
    </main>
  </body>
</html>
