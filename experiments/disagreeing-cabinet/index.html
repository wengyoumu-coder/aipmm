<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A four-drawer classification game with no correct answers and no score."
    />
    <title>The Disagreeing Cabinet</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Georgia, "Times New Roman", serif;
        background: #d8d0bf;
        color: #211d18;
        font-synthesis: none;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(rgb(255 255 255 / 18%) 1px, transparent 1px) 0 0 /
            100% 22px,
          radial-gradient(circle at 20% 10%, #eee8da 0, transparent 32rem),
          #d8d0bf;
      }

      button {
        font: inherit;
      }

      button:focus-visible {
        outline: 3px solid #a13f2d;
        outline-offset: 4px;
      }

      .page {
        width: min(100% - 32px, 920px);
        margin: 0 auto;
        padding: 56px 0 72px;
      }

      .museum-mark {
        margin: 0 0 10px;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        max-width: 720px;
        margin-bottom: 22px;
        font-size: clamp(3rem, 9vw, 7.2rem);
        font-weight: 400;
        letter-spacing: -0.065em;
        line-height: 0.83;
      }

      .standfirst {
        max-width: 620px;
        margin-bottom: 34px;
        font-size: clamp(1.15rem, 2.4vw, 1.45rem);
        line-height: 1.55;
      }

      .plain-button,
      .continue-button {
        min-height: 48px;
        border: 1px solid #211d18;
        border-radius: 999px;
        padding: 12px 22px;
        background: #211d18;
        color: #f7f1e4;
        cursor: pointer;
      }

      .plain-button:hover,
      .continue-button:hover {
        background: #a13f2d;
        border-color: #a13f2d;
      }

      .game-panel {
        border: 1px solid rgb(33 29 24 / 32%);
        background: rgb(247 241 228 / 72%);
        box-shadow: 0 24px 70px rgb(39 31 20 / 12%);
      }

      .drawer-heading {
        padding: 30px 32px 22px;
        border-bottom: 1px solid rgb(33 29 24 / 25%);
      }

      .progress {
        margin-bottom: 10px;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .drawer-heading h2 {
        margin-bottom: 8px;
        font-size: clamp(1.8rem, 5vw, 3.25rem);
        font-weight: 400;
        line-height: 1;
      }

      .prompt {
        margin-bottom: 0;
        color: #5f574c;
        font-style: italic;
      }

      .objects {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .object-button {
        min-height: 142px;
        border: 0;
        border-right: 1px solid rgb(33 29 24 / 25%);
        border-bottom: 1px solid rgb(33 29 24 / 25%);
        padding: 26px;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font-size: clamp(1.4rem, 4vw, 2.4rem);
        text-align: left;
        transition:
          background 160ms ease,
          color 160ms ease;
      }

      .object-button:nth-child(2n) {
        border-right: 0;
      }

      .object-button:hover:not(:disabled) {
        background: #211d18;
        color: #f7f1e4;
      }

      .object-button:disabled {
        cursor: default;
        opacity: 0.28;
      }

      .object-button[aria-pressed="true"] {
        background: #a13f2d;
        color: #fff8eb;
        opacity: 1;
      }

      .response {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
        padding: 30px 32px 34px;
        background: #211d18;
        color: #f7f1e4;
      }

      .response h3 {
        margin: 0 0 10px;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 0.72rem;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      .response p {
        margin-bottom: 0;
        font-size: 1.08rem;
        line-height: 1.55;
      }

      .continue-wrap {
        grid-column: 1 / -1;
        padding-top: 6px;
      }

      .continue-button {
        background: #f7f1e4;
        color: #211d18;
        border-color: #f7f1e4;
      }

      .exhibit {
        max-width: 720px;
        border: 12px solid #211d18;
        padding: clamp(28px, 6vw, 56px);
        background: #f7f1e4;
        box-shadow: 18px 18px 0 #a13f2d;
      }

      .exhibit h2 {
        margin-bottom: 14px;
        font-size: clamp(2.3rem, 7vw, 4.6rem);
        font-weight: 400;
        letter-spacing: -0.045em;
        line-height: 0.95;
      }

      .exhibit-intro {
        max-width: 540px;
        margin-bottom: 34px;
        line-height: 1.55;
      }

      .label-list {
        display: grid;
        gap: 0;
        margin: 0 0 34px;
      }

      .label-entry {
        display: grid;
        grid-template-columns: minmax(140px, 1.2fr) 1fr 1fr;
        gap: 18px;
        border-top: 1px solid #8c8273;
        padding: 15px 0;
      }

      .label-entry dt,
      .label-entry dd {
        margin: 0;
      }

      .label-entry dt {
        font-style: italic;
      }

      .label-entry span {
        display: block;
        margin-bottom: 4px;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 0.62rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      [hidden] {
        display: none !important;
      }

      @media (max-width: 620px) {
        .page {
          width: min(100% - 20px, 920px);
          padding-top: 34px;
        }

        .drawer-heading,
        .response {
          padding-left: 20px;
          padding-right: 20px;
        }

        .object-button {
          min-height: 112px;
          padding: 18px;
        }

        .response {
          grid-template-columns: 1fr;
        }

        .continue-wrap {
          grid-column: 1;
        }

        .label-entry {
          grid-template-columns: 1fr;
          gap: 8px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section id="introduction" aria-labelledby="title">
        <p class="museum-mark">Four drawers / no correct answer</p>
        <h1 id="title">The Disagreeing Cabinet</h1>
        <p class="standfirst">
          Set aside the object that does not belong. The cabinet will put it
          back, choose another, and explain neither of you away.
        </p>
        <button class="plain-button" id="begin-button" type="button">
          Open the first drawer
        </button>
      </section>

      <section
        class="game-panel"
        id="game"
        aria-labelledby="drawer-title"
        hidden
      >
        <header class="drawer-heading">
          <p class="progress" id="progress"></p>
          <h2 id="drawer-title"></h2>
          <p class="prompt">Which one does not belong?</p>
        </header>
        <div class="objects" id="objects"></div>
        <div class="response" id="response" aria-live="polite" hidden>
          <div>
            <h3>You set aside</h3>
            <p id="visitor-response"></p>
          </div>
          <div>
            <h3>The cabinet sets aside</h3>
            <p id="cabinet-response"></p>
          </div>
          <div class="continue-wrap">
            <button class="continue-button" id="continue-button" type="button">
              Open the next drawer
            </button>
          </div>
        </div>
      </section>

      <section class="exhibit" id="exhibit" aria-labelledby="exhibit-title" hidden>
        <p class="museum-mark">Local exhibit label</p>
        <h2 id="exhibit-title"></h2>
        <p class="exhibit-intro" id="exhibit-intro"></p>
        <dl class="label-list" id="label-list"></dl>
        <button class="plain-button" id="restart-button" type="button">
          Empty the cabinet
        </button>
      </section>
    </main>

    <script type="module" src="./cabinet.js"></script>
  </body>
</html>
